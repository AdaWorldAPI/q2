[build]
builder = "dockerfile"
# Use Dockerfile.demo (static fallback) until Rust binary build stabilizes.
# Switch to Dockerfile (full Rust binary) once cargo build -p quarto passes.
dockerfilePath = "Dockerfile.demo"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
