[build]
builder = "dockerfile"
# Dockerfile builds: Node (Vite frontend) → Rust (cockpit-server with embedded frontend)
# Dockerfile.demo is the Node-only fallback if Rust build fails.
dockerfilePath = "Dockerfile.demo"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
