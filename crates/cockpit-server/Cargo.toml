[package]
name = "cockpit-server"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
description = "Single-binary graph notebook cockpit — embeds UI + lance-graph + ndarray + V8 JIT"

[[bin]]
name = "q2-cockpit"
path = "src/main.rs"

[dependencies]
# Web server
axum.workspace = true
tower-http.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }

# SSE streaming
async-stream.workspace = true
futures-core.workspace = true

# Serialization
serde.workspace = true
serde_json = "1"

# Graph engine — lance-graph hot path (the REAL engine)
notebook-query.workspace = true
lance-graph.workspace = true

# The actual ndarray fork with SIMD (AVX-512/AVX2), HPC modules, graph ops
ndarray = { git = "https://github.com/AdaWorldAPI/ndarray.git", branch = "master" }

# V8 JIT — execute JS/TS inside the binary (transcoded from quarto-system-runtime)
deno_core.workspace = true
serde_v8.workspace = true

# Embed the Vite build output into the binary
include_dir.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true

[features]
default = []
# Enable the unified query planner (MUL+Compass → Thinking → Strategy)
planner = ["notebook-query/planner"]
# Enable the 10-layer cognitive stack (%%think magic)
orchestrator = ["notebook-query/orchestrator"]
# Neo4j Aura cold path fallback
neo4j-fallback = ["notebook-query/neo4j-fallback"]
