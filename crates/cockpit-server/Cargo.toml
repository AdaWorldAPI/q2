[package]
name = "cockpit-server"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
description = "Single-binary graph notebook cockpit — embeds UI + lance-graph + ndarray"

[[bin]]
name = "q2-cockpit"
path = "src/main.rs"

[dependencies]
# Web server
axum.workspace = true
tower-http.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }

# SSE streaming
async-stream.workspace = true
futures-core.workspace = true

# Serialization
serde.workspace = true
serde_json = "1"

# Graph engine — lance-graph hot path via workspace (cloned at ../lance-graph)
lance-graph.workspace = true
notebook-query.workspace = true

# ndarray — the real AdaWorldAPI fork (cloned at ../ndarray by Dockerfile)
q2-ndarray.workspace = true

# Embed the Vite build output into the binary
include_dir.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true

[features]
default = []
# V8 JIT engine — adds ~15 min compile time. Enable when JS/TS execution is needed.
v8-jit = ["dep:deno_core", "dep:serde_v8"]
# Enable the unified query planner (MUL+Compass → Thinking → Strategy)
planner = ["notebook-query/planner"]
# Enable the 10-layer cognitive stack (%%think magic)
orchestrator = ["notebook-query/orchestrator"]
# Neo4j Aura cold path fallback
neo4j-fallback = ["notebook-query/neo4j-fallback"]

[dependencies.deno_core]
workspace = true
optional = true

[dependencies.serde_v8]
workspace = true
optional = true
